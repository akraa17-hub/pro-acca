<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دفتر الأستاذ العام - النظام المحاسبي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700&display=swap');
        :root { --primary-color: #2563eb; }
        body { font-family: 'Readex Pro', sans-serif; background-color: #f8fafc; }
        .bg-primary { background-color: var(--primary-color); }
        .text-primary { color: var(--primary-color); }
        @media print { 
            .no-print { display: none !important; }
            body { background: white !important; }
            .print-shadow-none { shadow: none !important; border: 1px solid #eee !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { db, fs, applySystemSettings } from './config.js';
        window.db = db; window.fs = fs;
        window.applySystemSettings = applySystemSettings;
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        const GeneralLedgerPage = () => {
            const [accounts, setAccounts] = useState([]);
            const [journalEntries, setJournalEntries] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                window.applySystemSettings();
                
                const unsubAccounts = window.fs.onSnapshot(window.fs.collection(window.db, "accounts"), (snapshot) => {
                    setAccounts(snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id })));
                });

                const unsubJournals = window.fs.onSnapshot(window.fs.collection(window.db, "journalEntries"), (snapshot) => {
                    setJournalEntries(snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id })));
                    setLoading(false);
                });

                return () => { unsubAccounts(); unsubJournals(); };
            }, []);

            const activeAccounts = useMemo(() => {
                return accounts.filter(a => a.level === 3).map(acc => {
                    let runningBalance = 0;
                    const isDebitNature = ['asset', 'expense'].includes(acc.type);
                    
                    const movements = [];
                    // ترتيب القيود تاريخياً قبل الحساب
                    const sortedEntries = [...journalEntries].sort((a, b) => new Date(a.date) - new Date(b.date));
                    
                    sortedEntries.forEach(entry => {
                        entry.lines.forEach(line => {
                            if (line.accountId === acc.id) {
                                if (isDebitNature) {
                                    runningBalance += (Number(line.debit) - Number(line.credit));
                                } else {
                                    runningBalance += (Number(line.credit) - Number(line.debit));
                                }
                                movements.push({
                                    date: entry.date,
                                    desc: entry.description,
                                    note: line.note,
                                    debit: line.debit,
                                    credit: line.credit,
                                    balance: runningBalance
                                });
                            }
                        });
                    });
                    return { ...acc, movements };
                }).filter(acc => acc.movements.length > 0);
            }, [accounts, journalEntries]);

            if (loading) return <div className="p-10 text-center">جاري استخراج كشوف الحسابات...</div>;

            return (
                <div className="p-6 max-w-6xl mx-auto space-y-8">
                    <header className="flex justify-between items-center no-print">
                        <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                            <LucideIcon name="book" className="text-primary" size={28} /> دفتر الأستاذ العام
                        </h1>
                        <div className="flex gap-3">
                            <button onClick={() => window.location.href = 'index.html'} className="bg-slate-200 p-2.5 rounded-xl hover:bg-slate-300 transition-colors"><LucideIcon name="home" /></button>
                            <button onClick={() => window.print()} className="bg-primary text-white px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-md hover:opacity-90">
                                <LucideIcon name="printer" /> طباعة الكشوف
                            </button>
                        </div>
                    </header>

                    {activeAccounts.length === 0 ? (
                        <div className="text-center py-20 bg-white rounded-2xl border border-dashed border-slate-300 text-slate-400">
                            <LucideIcon name="database" size={48} className="mx-auto mb-4 opacity-20" />
                            <p>لا توجد حركات مسجلة لأي حساب حالياً.</p>
                        </div>
                    ) : (
                        <div className="space-y-10">
                            {activeAccounts.map(acc => (
                                <div key={acc.id} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden print-shadow-none break-inside-avoid">
                                    <div className="p-5 bg-slate-50 border-b flex justify-between items-center">
                                        <div>
                                            <span className="text-xs text-primary font-bold block mb-1 uppercase tracking-wider">{acc.code}</span>
                                            <h2 className="text-lg font-bold text-slate-800">{acc.name}</h2>
                                        </div>
                                        <div className="text-left">
                                            <span className="text-xs text-slate-400 block mb-1">الرصيد النهائي</span>
                                            <span className="text-xl font-black text-slate-900">
                                                {acc.movements[acc.movements.length - 1].balance.toLocaleString()}
                                            </span>
                                        </div>
                                    </div>
                                    <table className="w-full text-right text-sm">
                                        <thead className="bg-white text-slate-400 border-b">
                                            <tr>
                                                <th className="p-4 font-medium">التاريخ</th>
                                                <th className="p-4 font-medium">البيان / الحركة</th>
                                                <th className="p-4 font-medium text-center">مدين</th>
                                                <th className="p-4 font-medium text-center">دائن</th>
                                                <th className="p-4 font-medium text-left">الرصيد المتراكم</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {acc.movements.map((row, idx) => (
                                                <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                    <td className="p-4 text-slate-500 whitespace-nowrap">{row.date}</td>
                                                    <td className="p-4">
                                                        <span className="text-slate-800 font-medium block">{row.desc}</span>
                                                        {row.note && <span className="text-[10px] text-slate-400">{row.note}</span>}
                                                    </td>
                                                    <td className="p-4 text-center text-emerald-600 font-mono">{row.debit > 0 ? Number(row.debit).toLocaleString() : '-'}</td>
                                                    <td className="p-4 text-center text-red-600 font-mono">{row.credit > 0 ? Number(row.credit).toLocaleString() : '-'}</td>
                                                    <td className="p-4 text-left font-bold text-slate-700 font-mono">{row.balance.toLocaleString()}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GeneralLedgerPage />);
    </script>
</body>
</html>
