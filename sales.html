<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المبيعات المتطورة - النظام المحاسبي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700&display=swap');
        body { font-family: 'Readex Pro', sans-serif; background-color: #f8fafc; }
        .drawer-slide { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { db, fs, applySystemSettings } from './config.js';
        window.db = db; window.fs = fs;
        window.applySystemSettings = applySystemSettings;
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        const SalesPage = () => {
            const [customers, setCustomers] = useState([]);
            const [products, setProducts] = useState([]);
            const [sales, setSales] = useState([]);
            const [loading, setLoading] = useState(false);
            
            const [drawerOpen, setDrawerOpen] = useState(false);
            const [selectedSale, setSelectedSale] = useState(null);
            const [invoice, setInvoice] = useState({ 
                customerId: '', 
                productId: '', 
                quantity: 1, 
                unitPrice: 0, 
                date: new Date().toISOString().split('T')[0] 
            });

            useEffect(() => {
                window.applySystemSettings();
                window.fs.onSnapshot(window.fs.collection(window.db, "customers"), s => setCustomers(s.docs.map(d => ({...d.data(), id: d.id}))));
                window.fs.onSnapshot(window.fs.collection(window.db, "products"), s => setProducts(s.docs.map(d => ({...d.data(), id: d.id}))));
                window.fs.onSnapshot(window.fs.collection(window.db, "sales_invoices"), s => setSales(s.docs.map(d => ({...d.data(), id: d.id}))));
            }, []);

            const totalAmount = useMemo(() => invoice.quantity * invoice.unitPrice, [invoice.quantity, invoice.unitPrice]);

            const handleSaveSale = async () => {
                const prod = products.find(p => p.id === invoice.productId);
                if (!prod || prod.currentStock < invoice.quantity) {
                    alert(`خطأ: الكمية المتوفرة (${prod?.currentStock || 0}) لا تكفي للبيع.`);
                    return;
                }

                setLoading(true);
                try {
                    const cust = customers.find(c => c.id === invoice.customerId);
                    const entryId = Date.now().toString();

                    await window.fs.addDoc(window.fs.collection(window.db, "sales_invoices"), {
                        ...invoice,
                        totalAmount,
                        productName: prod.name,
                        customerName: cust.name,
                        entryId
                    });

                    // تحديث المخزون (خصم)
                    await window.fs.updateDoc(window.fs.doc(window.db, "products", invoice.productId), {
                        currentStock: Number(prod.currentStock) - Number(invoice.quantity)
                    });

                    // قيد الاستحقاق
                    await window.fs.setDoc(window.fs.doc(window.db, "journalEntries", entryId), {
                        date: invoice.date,
                        description: `مبيعات لـ ${cust.name}`,
                        lines: [
                            { accountId: '1103', debit: totalAmount, credit: 0, note: cust.name },
                            { accountId: '4101', debit: 0, credit: totalAmount, note: 'إيراد مبيعات' }
                        ]
                    });

                    setInvoice({ customerId: '', productId: '', quantity: 1, unitPrice: 0, date: new Date().toISOString().split('T')[0] });
                    alert("تم إصدار الفاتورة بنجاح");
                } catch (e) { alert("خطأ في المعالجة"); }
                setLoading(false);
            };

            const handleDelete = async (sale) => {
                if (!confirm("سيتم حذف الفاتورة وإعادة البضاعة للمخزون وحذف القيد. هل أنت متأكد؟")) return;
                try {
                    const prod = products.find(p => p.id === sale.productId);
                    if (prod) {
                        await window.fs.updateDoc(window.fs.doc(window.db, "products", sale.productId), {
                            currentStock: Number(prod.currentStock) + Number(sale.quantity)
                        });
                    }
                    if (sale.entryId) await window.fs.deleteDoc(window.fs.doc(window.db, "journalEntries", sale.entryId));
                    await window.fs.deleteDoc(window.fs.doc(window.db, "sales_invoices", sale.id));
                } catch (e) { alert("خطأ في الحذف"); }
            };

            return (
                <div className="min-h-screen relative overflow-x-hidden">
                    <div className="p-6 max-w-6xl mx-auto space-y-6">
                        <header className="flex justify-between items-center">
                            <h1 className="text-2xl font-black text-slate-800 flex items-center gap-2">
                                <LucideIcon name="badge-dollar-sign" className="text-green-600" size={28} /> مبيعات العملاء
                            </h1>
                            <button onClick={() => window.location.href='index.html'} className="bg-white p-2 rounded-xl border shadow-sm"><LucideIcon name="home" /></button>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* نموذج البيع */}
                            <div className="bg-white p-6 rounded-3xl border shadow-sm h-fit space-y-4">
                                <h2 className="font-bold border-b pb-2 flex items-center gap-2 text-green-700"><LucideIcon name="plus" size={18}/> فاتورة بيع جديدة</h2>
                                <select className="w-full border p-3 rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-green-500" value={invoice.customerId} onChange={e => setInvoice({...invoice, customerId: e.target.value})}>
                                    <option value="">اختر العميل</option>
                                    {customers.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </select>
                                <select className="w-full border p-3 rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-green-500" value={invoice.productId} onChange={e => setInvoice({...invoice, productId: e.target.value})}>
                                    <option value="">اختر الصنف</option>
                                    {products.map(p => <option key={p.id} value={p.id} disabled={p.currentStock <= 0}>{p.name} (المتوفر: {p.currentStock})</option>)}
                                </select>
                                <div className="grid grid-cols-2 gap-2">
                                    <input type="number" placeholder="الكمية" className="border p-3 rounded-xl outline-none" value={invoice.quantity} onChange={e => setInvoice({...invoice, quantity: Number(e.target.value)})} />
                                    <input type="number" placeholder="سعر البيع" className="border p-3 rounded-xl outline-none" value={invoice.unitPrice} onChange={e => setInvoice({...invoice, unitPrice: Number(e.target.value)})} />
                                </div>
                                <div className="bg-green-50 p-4 rounded-2xl flex justify-between font-black text-green-700 border border-green-100">
                                    <span>إجمالي الفاتورة:</span>
                                    <span className="font-mono">{totalAmount.toLocaleString()}</span>
                                </div>
                                <button onClick={handleSaveSale} disabled={loading} className="w-full bg-green-600 text-white py-4 rounded-2xl font-bold hover:bg-green-700 shadow-lg shadow-green-100 transition-all">إصدار الفاتورة</button>
                            </div>

                            {/* سجل المبيعات */}
                            <div className="lg:col-span-2 bg-white rounded-3xl border shadow-sm overflow-hidden">
                                <table className="w-full text-right text-sm">
                                    <thead className="bg-slate-50 border-b text-slate-500">
                                        <tr>
                                            <th className="p-4">العميل / الصنف</th>
                                            <th className="p-4 text-center">الكمية</th>
                                            <th className="p-4 text-left">المبلغ</th>
                                            <th className="p-4 text-left">إجراءات</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {sales.map(s => (
                                            <tr key={s.id} className="hover:bg-slate-50 transition-all group">
                                                <td className="p-4">
                                                    <div className="font-bold text-slate-700">{s.customerName}</div>
                                                    <div className="text-[10px] text-slate-400">{s.productName}</div>
                                                </td>
                                                <td className="p-4 text-center font-mono font-bold text-slate-600">{s.quantity}</td>
                                                <td className="p-4 text-left font-black text-green-600 font-mono">{Number(s.totalAmount).toLocaleString()}</td>
                                                <td className="p-4 flex justify-end gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <button onClick={() => {setSelectedSale(s); setDrawerOpen(true);}} className="p-2 text-blue-600 hover:bg-blue-50 rounded-lg" title="سند قبض"><LucideIcon name="wallet" size={16}/></button>
                                                    <button onClick={() => handleDelete(s)} className="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg" title="حذف"><LucideIcon name="trash-2" size={16}/></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* اللوح الجانبي لسندات القبض */}
                    {drawerOpen && <div className="fixed inset-0 bg-black/20 backdrop-blur-sm z-40" onClick={() => setDrawerOpen(false)}></div>}
                    <div className={`fixed top-0 left-0 h-full w-85 bg-white shadow-2xl z-50 p-8 drawer-slide transform ${drawerOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="flex justify-between items-center mb-8 border-b pb-4">
                            <h2 className="font-black text-xl text-slate-800">إصدار سند قبض</h2>
                            <button onClick={() => setDrawerOpen(false)} className="text-slate-400 hover:text-slate-800 transition-colors"><LucideIcon name="x" size={24} /></button>
                        </div>
                        {selectedSale && (
                            <div className="space-y-6">
                                <div className="p-4 bg-green-50 rounded-2xl border border-green-100">
                                    <p className="text-[10px] text-green-600 font-bold uppercase mb-2">تفاصيل الفاتورة</p>
                                    <div className="text-sm space-y-1">
                                        <div className="flex justify-between"><span>العميل:</span><span className="font-bold">{selectedSale.customerName}</span></div>
                                        <div className="flex justify-between font-black text-lg mt-2"><span>المطلوب:</span><span>{Number(selectedSale.totalAmount).toLocaleString()}</span></div>
                                    </div>
                                </div>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 block mb-1 uppercase">طريقة القبض</label>
                                        <select className="w-full border p-4 rounded-2xl bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500">
                                            <option>نقداً - الصندوق (1101)</option>
                                            <option>شيك - البنك (1102)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 block mb-1 uppercase">المبلغ المحصل</label>
                                        <input type="number" className="w-full border p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 text-lg font-mono font-bold" placeholder="0.00" />
                                    </div>
                                    <button onClick={() => {alert("تم تسجيل سند القبض يدوياً كعملية نقدية مستقلة بنجاح"); setDrawerOpen(false);}} className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all mt-4">حفظ السند</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SalesPage />);
    </script>
</body>
</html>
