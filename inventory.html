<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المخزون المطور - النظام المحاسبي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700&display=swap');
        body { font-family: 'Readex Pro', sans-serif; background-color: #f1f5f9; }
        .drawer-transition { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { db, fs, applySystemSettings } from './config.js';
        window.db = db; window.fs = fs;
        window.applySystemSettings = applySystemSettings;
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        const InventoryPage = () => {
            const [products, setProducts] = useState([]);
            const [isDrawerOpen, setIsDrawerOpen] = useState(false);
            const [editingProduct, setEditingProduct] = useState(null);
            const [formData, setFormData] = useState({ name: '', category: '', currentStock: 0, lastPurchasePrice: 0 });

            useEffect(() => {
                window.applySystemSettings();
                const unsubscribe = window.fs.onSnapshot(window.fs.collection(window.db, "products"), (snapshot) => {
                    setProducts(snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id })));
                });
                return () => unsubscribe();
            }, []);

            const openDrawer = (product = null) => {
                if (product) {
                    setEditingProduct(product);
                    setFormData({ ...product });
                } else {
                    setEditingProduct(null);
                    setFormData({ name: '', category: '', currentStock: 0, lastPurchasePrice: 0 });
                }
                setIsDrawerOpen(true);
            };

            const handleSave = async () => {
                if (!formData.name) return alert("يرجى إدخال اسم الصنف");
                try {
                    if (editingProduct) {
                        await window.fs.updateDoc(window.fs.doc(window.db, "products", editingProduct.id), formData);
                    } else {
                        await window.fs.addDoc(window.fs.collection(window.db, "products"), formData);
                    }
                    setIsDrawerOpen(false);
                } catch (e) { alert("خطأ في الحفظ"); }
            };

            const handleDelete = async (id) => {
                if (confirm("هل أنت متأكد من حذف هذا الصنف نهائياً؟")) {
                    await window.fs.deleteDoc(window.fs.doc(window.db, "products", id));
                }
            };

            return (
                <div className="relative min-h-screen overflow-x-hidden">
                    <div className="p-6 max-w-5xl mx-auto">
                        <header className="flex justify-between items-center mb-8">
                            <h1 className="text-2xl font-black text-slate-800 flex items-center gap-2">
                                <LucideIcon name="package" className="text-blue-600" size={28} /> إدارة المخزون
                            </h1>
                            <div className="flex gap-2">
                                <button onClick={() => openDrawer()} className="bg-blue-600 text-white px-4 py-2 rounded-xl flex items-center gap-2 hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all">
                                    <LucideIcon name="plus" /> صنف جديد
                                </button>
                                <button onClick={() => window.location.href='index.html'} className="bg-white p-2 rounded-xl border border-slate-200"><LucideIcon name="home" /></button>
                            </div>
                        </header>

                        <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                            <table className="w-full text-right">
                                <thead className="bg-slate-50 border-b">
                                    <tr>
                                        <th className="p-4 text-slate-500 font-bold">اسم الصنف</th>
                                        <th className="p-4 text-slate-500 font-bold">الفئة</th>
                                        <th className="p-4 text-center text-slate-500 font-bold">الرصيد الحالي</th>
                                        <th className="p-4 text-left text-slate-500 font-bold">إجراءات</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {products.map(p => (
                                        <tr key={p.id} className="hover:bg-slate-50 transition-colors group">
                                            <td className="p-4 font-bold text-slate-700">{p.name}</td>
                                            <td className="p-4"><span className="bg-slate-100 px-2 py-1 rounded-lg text-xs">{p.category}</span></td>
                                            <td className="p-4 text-center font-mono font-bold text-blue-600">{p.currentStock}</td>
                                            <td className="p-4 flex justify-end gap-2">
                                                <button onClick={() => openDrawer(p)} className="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all"><LucideIcon name="edit-3" size={16} /></button>
                                                <button onClick={() => handleDelete(p.id)} className="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all"><LucideIcon name="trash-2" size={16} /></button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* اللوح الجانبي المنزلق (Side Drawer) */}
                    {isDrawerOpen && <div className="fixed inset-0 bg-black/20 backdrop-blur-sm z-40" onClick={() => setIsDrawerOpen(false)}></div>}
                    <div className={`fixed top-0 left-0 h-full w-80 bg-white shadow-2xl z-50 p-6 drawer-transition transform ${isDrawerOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="flex justify-between items-center mb-6 border-b pb-4">
                            <h2 className="font-bold text-lg text-slate-800">{editingProduct ? 'تعديل صنف' : 'إضافة صنف جديد'}</h2>
                            <button onClick={() => setIsDrawerOpen(false)} className="text-slate-400"><LucideIcon name="x" /></button>
                        </div>
                        
                        <div className="space-y-4">
                            <div>
                                <label className="text-xs font-bold text-slate-400 mb-1 block uppercase">اسم المنتج</label>
                                <input type="text" className="w-full border p-3 rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" 
                                    value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-400 mb-1 block uppercase">الفئة</label>
                                <input type="text" className="w-full border p-3 rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" 
                                    value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-400 mb-1 block uppercase">الكمية الافتتاحية</label>
                                <input type="number" className="w-full border p-3 rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" 
                                    value={formData.currentStock} onChange={e => setFormData({...formData, currentStock: Number(e.target.value)})} />
                            </div>
                            <button onClick={handleSave} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 mt-6 transition-all">حفظ التغييرات</button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<InventoryPage />);
    </script>
</body>
</html>
