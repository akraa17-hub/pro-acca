<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التقارير المالية - النظام المحاسبي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700&display=swap');
        :root { --primary-color: #2563eb; }
        body { font-family: 'Readex Pro', sans-serif; background-color: #f8fafc; }
        .bg-primary { background-color: var(--primary-color); }
        .text-primary { color: var(--primary-color); }
        @media print { 
            .no-print { display: none !important; }
            body { background: white !important; }
            .print-border { border: 1px solid #e2e8f0 !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { db, fs, applySystemSettings } from './config.js';
        window.db = db; window.fs = fs;
        window.applySystemSettings = applySystemSettings;
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        const FinancialReportsPage = () => {
            const [reportType, setReportType] = useState('income');
            const [accounts, setAccounts] = useState([]);
            const [journalEntries, setJournalEntries] = useState([]);
            const [companyName, setCompanyName] = useState('المحاسب القانوني زياد العتيبي');

            useEffect(() => {
                const settings = window.applySystemSettings();
                if (settings && settings.companyName) setCompanyName(settings.companyName);
                
                const unsubAccounts = window.fs.onSnapshot(window.fs.collection(window.db, "accounts"), (snapshot) => {
                    setAccounts(snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id })));
                });

                const unsubJournals = window.fs.onSnapshot(window.fs.collection(window.db, "journalEntries"), (snapshot) => {
                    setJournalEntries(snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id })));
                });

                return () => { unsubAccounts(); unsubJournals(); };
            }, []);

            const getAccountBalance = (accountId) => {
                let balance = 0;
                const account = accounts.find(a => a.id === accountId);
                if (!account) return 0;
                journalEntries.forEach(entry => {
                    entry.lines.forEach(line => {
                        if (line.accountId === accountId) {
                            balance += (['asset', 'expense'].includes(account.type)) 
                                ? (Number(line.debit) - Number(line.credit)) 
                                : (Number(line.credit) - Number(line.debit));
                        }
                    });
                });
                return balance;
            };

            // الحسابات المالية الإجمالية
            const totals = useMemo(() => {
                const calc = (type) => accounts.filter(a => a.type === type && a.level === 3).reduce((sum, acc) => sum + getAccountBalance(acc.id), 0);
                const rev = calc('revenue');
                const exp = calc('expense');
                return {
                    revenues: rev,
                    expenses: exp,
                    netIncome: rev - exp,
                    assets: calc('asset'),
                    liabilities: calc('liability'),
                    equity: calc('equity')
                };
            }, [accounts, journalEntries]);

            return (
                <div className="p-6 max-w-5xl mx-auto space-y-6">
                    <header className="flex justify-between items-center no-print">
                        <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                            <LucideIcon name="pie-chart" className="text-primary" size={28} /> التقارير الختامية
                        </h1>
                        <div className="flex bg-white p-1 rounded-xl border border-slate-200 shadow-sm">
                            <button onClick={() => setReportType('income')} className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${reportType === 'income' ? 'bg-primary text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>قائمة الدخل</button>
                            <button onClick={() => setReportType('balance')} className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${reportType === 'balance' ? 'bg-primary text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>المركز المالي</button>
                            <button onClick={() => setReportType('trial')} className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${reportType === 'trial' ? 'bg-primary text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>ميزان المراجعة</button>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => window.print()} className="bg-slate-800 text-white p-2.5 rounded-xl hover:opacity-90 transition-all"><LucideIcon name="printer" /></button>
                            <button onClick={() => window.location.href = 'index.html'} className="bg-slate-200 p-2.5 rounded-xl hover:bg-slate-300 transition-all"><LucideIcon name="home" /></button>
                        </div>
                    </header>

                    <div className="bg-white p-10 rounded-3xl border border-slate-200 shadow-xl print-border relative overflow-hidden">
                        {/* ترويسة التقرير */}
                        <div className="text-center mb-10 border-b pb-8">
                            <h2 className="text-2xl font-black text-slate-900 mb-2">{companyName}</h2>
                            <p className="text-lg text-primary font-bold">
                                {reportType === 'income' ? 'قائمة الدخل التقديرية' : reportType === 'balance' ? 'قائمة المركز المالي' : 'ميزان المراجعة بالأرصدة'}
                            </p>
                            <p className="text-xs text-slate-400 mt-2 italic">بتاريخ: {new Date().toLocaleDateString('ar-SA')}</p>
                        </div>

                        {/* محتوى التقرير: ميزان المراجعة */}
                        {reportType === 'trial' && (
                            <table className="w-full text-right border-collapse">
                                <thead className="bg-slate-50 text-slate-500 text-xs font-bold uppercase tracking-wider">
                                    <tr>
                                        <th className="p-4 border-b">كود الحساب</th>
                                        <th className="p-4 border-b">اسم الحساب</th>
                                        <th className="p-4 border-b text-center">أرصدة مدينة</th>
                                        <th className="p-4 border-b text-center">أرصدة دائنة</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 text-sm">
                                    {accounts.filter(a => a.level === 3 && getAccountBalance(a.id) !== 0).map(acc => {
                                        const bal = getAccountBalance(acc.id);
                                        const isDebit = ['asset', 'expense'].includes(acc.type);
                                        return (
                                            <tr key={acc.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="p-4 font-mono text-slate-400">{acc.code}</td>
                                                <td className="p-4 font-bold text-slate-700">{acc.name}</td>
                                                <td className="p-4 text-center font-mono text-emerald-600">{isDebit ? bal.toLocaleString() : '-'}</td>
                                                <td className="p-4 text-center font-mono text-red-600">{!isDebit ? bal.toLocaleString() : '-'}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        )}

                        {/* محتوى التقرير: قائمة الدخل */}
                        {reportType === 'income' && (
                            <div className="space-y-8 max-w-2xl mx-auto">
                                <div className="space-y-4">
                                    <h3 className="font-bold text-emerald-600 flex items-center gap-2 border-b-2 border-emerald-50 pb-2">الإيرادات والنشاط</h3>
                                    {accounts.filter(a => a.type === 'revenue' && a.level === 3).map(acc => (
                                        <div key={acc.id} className="flex justify-between text-sm"><span>{acc.name}</span><span className="font-mono">{getAccountBalance(acc.id).toLocaleString()}</span></div>
                                    ))}
                                    <div className="flex justify-between font-black text-slate-900 pt-2 border-t"><span>إجمالي الإيرادات</span><span className="font-mono">{totals.revenues.toLocaleString()}</span></div>
                                </div>
                                <div className="space-y-4">
                                    <h3 className="font-bold text-red-500 flex items-center gap-2 border-b-2 border-red-50 pb-2">المصروفات والأعباء</h3>
                                    {accounts.filter(a => a.type === 'expense' && a.level === 3).map(acc => (
                                        <div key={acc.id} className="flex justify-between text-sm"><span>{acc.name}</span><span className="font-mono">({getAccountBalance(acc.id).toLocaleString()})</span></div>
                                    ))}
                                    <div className="flex justify-between font-black text-slate-900 pt-2 border-t"><span>إجمالي المصروفات</span><span className="font-mono">({totals.expenses.toLocaleString()})</span></div>
                                </div>
                                <div className={`p-6 rounded-2xl flex justify-between items-center text-white font-black text-xl shadow-lg ${totals.netIncome >= 0 ? 'bg-emerald-500 shadow-emerald-100' : 'bg-red-500 shadow-red-100'}`}>
                                    <span>صافي الربح / (الخسارة)</span>
                                    <span className="font-mono">{totals.netIncome.toLocaleString()}</span>
                                </div>
                            </div>
                        )}

                        {/* محتوى التقرير: المركز المالي */}
                        {reportType === 'balance' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                <div className="space-y-6">
                                    <h3 className="font-black text-slate-800 text-lg border-r-4 border-primary pr-3">الأصول</h3>
                                    <div className="space-y-2">
                                        {accounts.filter(a => a.type === 'asset' && getAccountBalance(a.id) !== 0).map(acc => (
                                            <div key={acc.id} className="flex justify-between text-sm border-b border-dotted pb-1"><span>{acc.name}</span><span className="font-mono">{getAccountBalance(acc.id).toLocaleString()}</span></div>
                                        ))}
                                    </div>
                                    <div className="flex justify-between font-black text-primary border-t-2 pt-2"><span>إجمالي الأصول</span><span className="font-mono">{totals.assets.toLocaleString()}</span></div>
                                </div>
                                <div className="space-y-10">
                                    <div className="space-y-4">
                                        <h3 className="font-black text-slate-800 text-lg border-r-4 border-red-400 pr-3">الالتزامات وحقوق الملكية</h3>
                                        <div className="space-y-2">
                                            {accounts.filter(a => (a.type === 'liability' || a.type === 'equity') && getAccountBalance(a.id) !== 0).map(acc => (
                                                <div key={acc.id} className="flex justify-between text-sm border-b border-dotted pb-1"><span>{acc.name}</span><span className="font-mono">{getAccountBalance(acc.id).toLocaleString()}</span></div>
                                            ))}
                                            <div className="flex justify-between text-sm border-b border-dotted pb-1 text-emerald-600 font-bold"><span>صافي أرباح العام</span><span className="font-mono">{totals.netIncome.toLocaleString()}</span></div>
                                        </div>
                                        <div className="flex justify-between font-black text-red-600 border-t-2 pt-2"><span>إجمالي الالتزامات والملكية</span><span className="font-mono">{(totals.liabilities + totals.equity + totals.netIncome).toLocaleString()}</span></div>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {/* تذييل احترافي للطباعة */}
                        <div className="mt-16 pt-8 border-t flex justify-between text-xs text-slate-400 italic">
                            <span>صدر بواسطة النظام المحاسبي الذكي</span>
                            <span>توقيع المدير المالي / ........................</span>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FinancialReportsPage />);
    </script>
</body>
</html>
