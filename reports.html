<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التقارير المالية الختامية - النظام المحاسبي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700&display=swap');
        body { font-family: 'Readex Pro', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { db, fs, applySystemSettings } from './config.js';
        window.db = db; window.fs = fs;
        window.applySystemSettings = applySystemSettings;
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const LucideIcon = ({ name, size = 18 }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} width={size} height={size}></i>;
        };

        const ReportsPage = () => {
            const [entries, setEntries] = useState([]);
            const [accounts, setAccounts] = useState([]);
            const [activeTab, setActiveTab] = useState('trial-balance');

            useEffect(() => {
                window.applySystemSettings();
                // جلب البيانات بشكل متزامن لضمان الدقة
                const unsubAccounts = window.fs.onSnapshot(window.fs.collection(window.db, "accounts"), s => setAccounts(s.docs.map(d => ({...d.data(), id: d.id}))));
                const unsubEntries = window.fs.onSnapshot(window.fs.collection(window.db, "journalEntries"), s => setEntries(s.docs.map(d => d.data())));
                return () => { unsubAccounts(); unsubEntries(); };
            }, []);

            // ميزان المراجعة الذكي (يعكس كل العمليات)
            const trialBalance = useMemo(() => {
                const balances = {};
                accounts.forEach(acc => balances[acc.id] = { name: acc.name, id: acc.id, debit: 0, credit: 0 });
                
                entries.forEach(entry => {
                    entry.lines?.forEach(line => {
                        if (balances[line.accountId]) {
                            balances[line.accountId].debit += Number(line.debit || 0);
                            balances[line.accountId].credit += Number(line.credit || 0);
                        }
                    });
                });
                return Object.values(balances);
            }, [entries, accounts]);

            return (
                <div className="p-6 max-w-6xl mx-auto space-y-6">
                    <header className="flex justify-between items-center bg-white p-6 rounded-3xl border shadow-sm">
                        <h1 className="text-2xl font-black text-slate-800 flex items-center gap-2">
                            <LucideIcon name="file-spreadsheet" size={28} /> التقارير المالية الختامية
                        </h1>
                        <button onClick={() => window.location.href='index.html'} className="p-2 border rounded-xl"><LucideIcon name="home" /></button>
                    </header>

                    {/* التبويبات الثلاثة المطلوبة */}
                    <div className="flex bg-white rounded-2xl shadow-sm overflow-hidden p-1 border">
                        {['trial-balance', 'income-statement', 'balance-sheet'].map((tab) => (
                            <button key={tab} onClick={() => setActiveTab(tab)} 
                                className={`flex-1 py-3 rounded-xl font-bold transition-all ${activeTab === tab ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-50'}`}>
                                {tab === 'trial-balance' ? 'ميزان المراجعة' : tab === 'income-statement' ? 'قائمة الدخل' : 'المركز المالي'}
                            </button>
                        ))}
                    </div>

                    <div className="bg-white rounded-3xl border shadow-sm overflow-hidden">
                        <table className="w-full text-right">
                            <thead className="bg-slate-50 text-slate-500 text-xs border-b">
                                <tr>
                                    <th className="p-4">الحساب</th>
                                    {activeTab === 'trial-balance' ? (
                                        <>
                                            <th className="p-4 text-center">مدين</th>
                                            <th className="p-4 text-center">دائن</th>
                                        </>
                                    ) : (
                                        <th className="p-4 text-left">القيمة</th>
                                    )}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {trialBalance.filter(acc => {
                                    if (activeTab === 'income-statement') return acc.id.startsWith('4') || acc.id.startsWith('5');
                                    if (activeTab === 'balance-sheet') return acc.id.startsWith('1') || acc.id.startsWith('2') || acc.id.startsWith('3');
                                    return true;
                                }).map(acc => {
                                    const netBalance = (acc.id.startsWith('1') || acc.id.startsWith('5')) ? acc.debit - acc.credit : acc.credit - acc.debit;
                                    return (
                                        <tr key={acc.id} className="hover:bg-slate-50">
                                            <td className="p-4 font-bold">{acc.name} <span className="text-[10px] text-slate-400 block">{acc.id}</span></td>
                                            {activeTab === 'trial-balance' ? (
                                                <>
                                                    <td className="p-4 text-center font-mono">{acc.debit.toLocaleString()}</td>
                                                    <td className="p-4 text-center font-mono">{acc.credit.toLocaleString()}</td>
                                                </>
                                            ) : (
                                                <td className={`p-4 text-left font-black font-mono ${netBalance < 0 ? 'text-red-500' : 'text-blue-600'}`}>{netBalance.toLocaleString()}</td>
                                            )}
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ReportsPage />);
    </script>
</body>
</html>
