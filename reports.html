<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التقارير المالية الاحترافية - أكرم فاضل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;600;700&display=swap');
        body { font-family: 'Readex Pro', sans-serif; background-color: #f8fafc; }
        .tab-active { background-color: #2563eb; color: white; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { db, fs, applySystemSettings } from './config.js';
        window.db = db; window.fs = fs;
        window.applySystemSettings = applySystemSettings;
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const LucideIcon = ({ name, size = 18 }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}}></i>;
        };

        const ReportsApp = () => {
            const [accounts, setAccounts] = useState([]);
            const [entries, setEntries] = useState([]);
            const [activeTab, setActiveTab] = useState('tb'); // tb: Trial Balance, is: Income Statement, bs: Balance Sheet

            useEffect(() => {
                if (window.applySystemSettings) window.applySystemSettings();
                
                // جلب البيانات مع التأكد من وجود window.db
                const fetch = () => {
                    if (!window.db) return setTimeout(fetch, 500);
                    window.fs.onSnapshot(window.fs.collection(window.db, "accounts"), s => 
                        setAccounts(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    window.fs.onSnapshot(window.fs.collection(window.db, "journalEntries"), s => 
                        setEntries(s.docs.map(d => d.data())));
                };
                fetch();
            }, []);

            // معالجة البيانات محاسبياً (Core Logic)
            const processedData = useMemo(() => {
                const map = {};
                accounts.forEach(a => map[a.id] = { ...a, debit: 0, credit: 0 });
                
                entries.forEach(e => {
                    e.lines?.forEach(l => {
                        if (map[l.accountId]) {
                            map[l.accountId].debit += Number(l.debit || 0);
                            map[l.accountId].credit += Number(l.credit || 0);
                        }
                    });
                });

                return Object.values(map).map(a => {
                    // طبيعة الحساب: 1 أصول، 2 خصوم، 3 ملكية، 4 إيراد، 5 مصروف
                    const isDebit = a.id.startsWith('1') || a.id.startsWith('5');
                    return { ...a, balance: isDebit ? a.debit - a.credit : a.credit - a.debit };
                });
            }, [accounts, entries]);

            const filteredData = processedData.filter(a => {
                if (activeTab === 'is') return a.id.startsWith('4') || a.id.startsWith('5');
                if (activeTab === 'bs') return a.id.startsWith('1') || a.id.startsWith('2') || a.id.startsWith('3');
                return true;
            });

            return (
                <div className="p-4 md:p-8">
                    <div className="max-w-6xl mx-auto space-y-6">
                        <div className="flex justify-between items-center bg-white p-6 rounded-3xl shadow-sm border">
                            <h1 className="text-2xl font-black text-slate-800 flex items-center gap-3">
                                <LucideIcon name="file-text" size={28} /> التقارير الختامية الموحدة
                            </h1>
                            <button onClick={() => window.location.href='index.html'} className="p-2 hover:bg-slate-100 rounded-xl transition-all">
                                <LucideIcon name="home" />
                            </button>
                        </div>

                        {/* أزرار التنقل الاحترافية */}
                        <div className="grid grid-cols-3 gap-2 bg-white p-2 rounded-2xl border shadow-sm">
                            <button onClick={() => setActiveTab('tb')} className={`py-3 rounded-xl font-bold transition-all ${activeTab === 'tb' ? 'tab-active' : 'text-slate-500 hover:bg-slate-50'}`}>ميزان المراجعة</button>
                            <button onClick={() => setActiveTab('is')} className={`py-3 rounded-xl font-bold transition-all ${activeTab === 'is' ? 'tab-active' : 'text-slate-500 hover:bg-slate-50'}`}>قائمة الدخل</button>
                            <button onClick={() => setActiveTab('bs')} className={`py-3 rounded-xl font-bold transition-all ${activeTab === 'bs' ? 'tab-active' : 'text-slate-500 hover:bg-slate-50'}`}>المركز المالي</button>
                        </div>

                        {/* الجدول الموحد */}
                        <div className="bg-white rounded-3xl border shadow-sm overflow-hidden">
                            <table className="w-full text-right">
                                <thead className="bg-slate-50 border-b text-slate-400 text-xs">
                                    <tr>
                                        <th className="p-4">اسم الحساب (الكود)</th>
                                        <th className="p-4 text-center">مدين / إجمالي</th>
                                        <th className="p-4 text-center">دائن / إجمالي</th>
                                        <th className="p-4 text-left">الرصيد الصافي</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {filteredData.map(acc => (
                                        <tr key={acc.id} className="hover:bg-blue-50/50 transition-colors group">
                                            <td className="p-4 font-bold text-slate-700">{acc.name} <span className="text-[10px] text-slate-300 mr-2 uppercase">{acc.id}</span></td>
                                            <td className="p-4 text-center font-mono text-slate-500">{acc.debit.toLocaleString()}</td>
                                            <td className="p-4 text-center font-mono text-slate-500">{acc.credit.toLocaleString()}</td>
                                            <td className={`p-4 text-left font-black font-mono ${acc.balance < 0 ? 'text-red-500' : 'text-blue-600'}`}>{acc.balance.toLocaleString()}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {filteredData.length === 0 && <div className="p-20 text-center text-slate-400">لا توجد بيانات لعرضها حالياً</div>}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ReportsApp />);
    </script>
</body>
</html>
